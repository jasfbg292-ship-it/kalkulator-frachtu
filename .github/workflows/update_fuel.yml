name: Aktualizacja dodatku paliwowego JAS-FBG

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 czasu polskiego (5:00 UTC)
    - cron: '0 9 * * *'   # 11:00 czasu polskiego (9:00 UTC)
    - cron: '0 13 * * *'  # 15:00 czasu polskiego (13:00 UTC)
  workflow_dispatch:        # Mozliwosc recznego uruchomienia jednym kliknieciem

jobs:
  update-fuel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj biblioteki
        run: pip install requests beautifulsoup4 pdfplumber

      - name: Uruchom skrypt aktualizacji
        run: python update_fuel.py

      - name: Zapisz fuel.json do repozytorium
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add fuel.json
          git diff --cached --quiet || git commit -m "Aktualizacja dodatku paliwowego $(date '+%d.%m.%Y %H:%M')"
          git push
